name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
          - '1.8'
          - '1.9'
        os:
          - ubuntu-latest
        arch:
          - x64
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 18123:8123
        env:
          CLICKHOUSE_PASSWORD: test
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CLICKHOUSE_URL: "http://localhost:18123"
      CLICKHOUSE_PASSWORD: test
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/add-julia-registry@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          registry: bhftbootcamp/Green
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "${CLICKHOUSE_URL}/ping" | grep -q "Ok"; then
              echo "ClickHouse is ready"
              exit 0
            fi
            echo "Waiting for ClickHouse ($i/30)..."
            sleep 2
          done
          echo "ClickHouse did not become ready in time" >&2
          exit 1
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
